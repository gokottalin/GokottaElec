<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GokottaElec 在线预览</title>
  <link rel="stylesheet" href="./gokotta-elec.css" />
</head>
<body>
  <main class="ge-shell">
    <header class="ge-header">
      <div class="ge-brand-mark" aria-hidden="true">G</div>
      <div>
        <h1>GokottaElec 在线预览</h1>
        <p>粘贴 LLM 输出的 CNL 文本，调用预留 API 生成脚本化 SVG 原理图。</p>
      </div>
    </header>

    <section class="ge-workspace" aria-label="GokottaElec 工具">
      <section class="ge-panel ge-editor-panel">
        <div class="ge-panel-head">
          <h2>CNL 输入</h2>
          <select id="sampleSelect" aria-label="选择 Sample">
            <option value="">加载 Sample</option>
          </select>
        </div>
        <textarea id="cnlInput" spellcheck="false" placeholder="请粘贴 LLM 输出的 CNL 文本。"></textarea>
        <div class="ge-toolbar">
          <button id="renderButton" type="button">生成预览</button>
          <button id="clearButton" type="button">清空</button>
          <button id="copyButton" type="button">复制输入</button>
        </div>
      </section>

      <section class="ge-panel ge-preview-panel">
        <div class="ge-panel-head">
          <h2>SVG 原理图</h2>
          <div class="ge-actions">
            <button id="fitButton" type="button">适配</button>
            <button id="downloadSvgButton" type="button" disabled>下载 SVG</button>
          </div>
        </div>
        <div id="svgPreview" class="ge-preview-empty">等待生成预览</div>
      </section>
    </section>

    <section class="ge-bottom">
      <section class="ge-panel">
        <div class="ge-panel-head">
          <h2>诊断日志</h2>
        </div>
        <pre id="diagnosticsLog">接口尚未调用。</pre>
      </section>
      <section class="ge-panel">
        <div class="ge-panel-head">
          <h2>IR JSON</h2>
          <button id="copyIrButton" type="button" disabled>复制 IR</button>
        </div>
        <pre id="irViewer">{}</pre>
      </section>
    </section>
  </main>

  <script src="./gokotta-elec.js"></script>
</body>
</html>
